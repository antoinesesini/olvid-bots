services:
  daemon:
    image: olvid/bot-daemon:1.5.0
    environment:
      - OLVID_ADMIN_CLIENT_KEY_CLI=RANDOMVALUE
    volumes:
      - ./data:/daemon/data
    ports:
      - "50051:50051"
    networks:
      - olvid_bots_network

  cli:
    image: olvid/bot-python-runner:1.5.0
    entrypoint: "olvid-cli"
    environment:
      - OLVID_ADMIN_CLIENT_KEY=RANDOMVALUE
      - OLVID_DAEMON_TARGET=daemon:50051
    stdin_open: true
    tty: true
    profiles: ["cli"]
    networks:
      - olvid_bots_network

networks:
  olvid_bots_network:
    driver: bridge